name: Feedback Wall Processor

on:
  issues:
    types: [opened, edited]
  workflow_dispatch: # Permite ejecutarlo manualmente cuando quieras
  
jobs:
  append-feedback:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Parse Issue Form & Filter Trolls
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            
            // 1. Extraer los campos usando regex simples
            const textMatch = body.match(/### Tu comentario\s+([\s\S]*?)(?=\s+###|$)/);
            const aliasMatch = body.match(/### Alias \/ Nombre \(Opcional\)\s+([\s\S]*?)(?=\s+###|$)/);
            
            let text = textMatch ? textMatch[1].trim() : '';
            let alias = aliasMatch ? aliasMatch[1].trim() : 'Anónimo';
            if (alias === '_No response_') alias = 'Anónimo';

            // Recortar a 140 caracteres por seguridad
            text = text.substring(0, 140);

            // 2. Filtro básico anti-trolls (puedes añadir las palabras que quieras)
            const forbiddenWords = ['scam', 'mierda', 'idiota', 'spam', 'bot']; 
            const isTroll = forbiddenWords.some(word => text.toLowerCase().includes(word) || alias.toLowerCase().includes(word));

            if (isTroll) {
              core.setFailed("Contenido bloqueado por el filtro anti-trolls.");
              return;
            }

            // 3. Formatear la línea de Markdown que irá al README
            const date = new Date().toLocaleDateString('es-ES', { year: 'numeric', month: 'short' });
            const feedbackLine = `> "${text}" — **${alias}** (${date})\n<br/>\n`;
            
            core.setOutput("line", feedbackLine);

      - name: Inject Feedback into README
        if: success() && steps.parse.outputs.is_feedback == 'true'
        run: |
          FEEDBACK_LINE="${{ steps.parse.outputs.line }}"
          
          # Usar Node.js para editar el archivo de forma segura protegiendo saltos de línea
          node -e "
            const fs = require('fs');
            let readme = fs.readFileSync('README.md', 'utf8');
            const target = '<!-- START_FEEDBACK_WALL -->';
            
            // Reemplazar el marcador añadiendo el nuevo feedback justo debajo
            // Si estaba el mensaje por defecto de 'no hay comentarios', lo limpia
            readme = readme.replace('*¡Todavía no hay comentarios! Sé el primero en dejar uno arriba.*', '');
            readme = readme.replace(target, target + '\n' + process.env.NEW_LINE);
            
            fs.writeFileSync('README.md', readme);
          "
        env:
          NEW_LINE: ${{ steps.parse.outputs.line }}

      - name: Commit and Push changes
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "New anonymous feedback added to the wall"
          git push

      - name: Close and Lock Issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            // Cierra el issue y lo bloquea para mantener el orden de la pestaña Issues
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed'
            });
            await github.rest.issues.lock({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              lock_reason: 'resolved'
            });
