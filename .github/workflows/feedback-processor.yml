name: Feedback Wall Processor

on:
  issues:
    types: [opened, edited]
    workflow_dispatch:
jobs:
  append-feedback:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write # Este permiso es correcto y obligatorio

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Parse Issue Form & Filter Trolls
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            
            if (!issue) {
              console.log("No se ha encontrado un issue válido en el payload. Saltando...");
              core.setOutput("is_feedback", "false");
              return;
            }

            const title = issue.title || '';
            const body = issue.body || '';
            const labels = issue.labels ? issue.labels.map(l => l.name) : [];

            if (!title.startsWith('Feedback:') && !labels.includes('anonymous-feedback')) {
              console.log("Este issue no es de feedback. Saltando...");
              core.setOutput("is_feedback", "false");
              return;
            }
            core.setOutput("is_feedback", "true");
            core.setOutput("issue_number", issue.number.toString()); // Guardamos el número de forma segura
            
            const textMatch = body.match(/### Tu comentario\s+([\s\S]*?)(?=\s+###|$)/);
            const aliasMatch = body.match(/### Alias \/ Nombre \(Opcional\)\s+([\s\S]*?)(?=\s+###|$)/);
            
            let text = textMatch ? textMatch[1].trim() : '';
            let alias = aliasMatch ? aliasMatch[1].trim() : 'Anónimo';
            if (alias === '_No response_') alias = 'Anónimo';

            text = text.substring(0, 140);

            const forbiddenWords = ['scam', 'mierda', 'idiota', 'spam', 'bot']; 
            const isTroll = forbiddenWords.some(word => text.toLowerCase().includes(word) || alias.toLowerCase().includes(word));

            if (isTroll) {
              core.setFailed("Contenido bloqueado por el filtro anti-trolls.");
              return;
            }

            const date = new Date().toLocaleDateString('es-ES', { year: 'numeric', month: 'short' });
            const feedbackLine = `> "${text}" — **${alias}** (${date})\n<br/>\n`;
            
            core.setOutput("line", feedbackLine);

      - name: Inject Feedback into README
        if: success() && steps.parse.outputs.is_feedback == 'true'
        run: |
          node -e "
            const fs = require('fs');
            let readme = fs.readFileSync('README.md', 'utf8');
            const target = '<!-- START_FEEDBACK_WALL -->';
            readme = readme.replace('*¡Todavía no hay comentarios! Sé el primero en dejar uno arriba.*', '');
            readme = readme.replace(target, target + '\n' + process.env.NEW_LINE);
            fs.writeFileSync('README.md', readme);
          "
        env:
          NEW_LINE: ${{ steps.parse.outputs.line }}

      - name: Commit and Push changes
        if: success() && steps.parse.outputs.is_feedback == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "New anonymous feedback added to the wall"
          git push

      - name: Close and Lock Issue
        if: always() && steps.parse.outputs.is_feedback == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Recuperamos el número que guardamos de forma segura en el primer paso
            const issueNumber = parseInt('${{ steps.parse.outputs.issue_number }}');
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'completed'
            });
            await github.rest.issues.lock({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              lock_reason: 'resolved'
            });
